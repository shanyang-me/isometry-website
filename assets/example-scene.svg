<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: room -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  <!-- Wall -->
  <rect x="0" y="0" width="512" height="360" fill="#1e1e30"/>
  <!-- Baseboard -->
  <rect x="0" y="350" width="512" height="12" fill="#2a2a3a" rx="1"/>
  <!-- Floor -->
  <rect x="0" y="362" width="512" height="150" fill="#252535"/>
  <!-- Floor lines -->
  <line x1="0" y1="400" x2="512" y2="400" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="0" y1="440" x2="512" y2="440" stroke="#2a2a3a" stroke-width="1"/>
  <line x1="0" y1="480" x2="512" y2="480" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Table -->
  <!-- Table top -->
  <rect x="80" y="250" width="380" height="18" rx="3" fill="#6b4226"/>
  <rect x="80" y="250" width="380" height="6" rx="3" fill="#7a5230" opacity="0.6"/>
  <!-- Table legs -->
  <rect x="95" y="268" width="14" height="94" fill="#5a3520" rx="2"/>
  <rect x="431" y="268" width="14" height="94" fill="#5a3520" rx="2"/>
  <rect x="95" y="354" width="14" height="8" fill="#4a2a18" rx="1"/>
  <rect x="431" y="354" width="14" height="8" fill="#4a2a18" rx="1"/>
  <!-- Table surface highlight -->
  <rect x="90" y="253" width="360" height="2" fill="#8a6238" opacity="0.3" rx="1"/>

  <!-- Glass cup — positioned on the edge, ~55% overhang -->
  <g>
    <!-- Glass body (trapezoid shape using path) -->
    <path d="M370 168 L380 248 L418 248 L428 168 Z" fill="#7dd3fc" opacity="0.25" stroke="#93c5fd" stroke-width="1.5"/>
    <!-- Glass inner highlight -->
    <path d="M374 174 L382 242 L398 242 L392 174 Z" fill="#bae6fd" opacity="0.1"/>
    <!-- Glass rim -->
    <ellipse cx="399" cy="168" rx="29" ry="6" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.6"/>
    <!-- Glass base -->
    <ellipse cx="399" cy="248" rx="19" ry="4" fill="#93c5fd" opacity="0.3"/>
    <!-- Light reflection -->
    <path d="M378 180 L380 220" stroke="#bae6fd" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <path d="M384 175 L385 200" stroke="#bae6fd" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
    <!-- Water inside (partial fill) -->
    <path d="M377 210 L381 245 L417 245 L421 210 Z" fill="#38bdf8" opacity="0.15"/>
    <ellipse cx="399" cy="210" rx="22" ry="5" fill="#38bdf8" opacity="0.12"/>
  </g>

  <!-- Shadow under glass -->
  <ellipse cx="399" cy="252" rx="22" ry="3" fill="#000" opacity="0.15"/>

  <!-- Subtle ambient light on wall -->
  <radialGradient id="ambientLight" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="512" height="360" fill="url(#ambientLight)"/>

  <!-- Edge indicator — subtle dashed line showing table edge -->
  <line x1="460" y1="250" x2="460" y2="268" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <text x="468" y="262" fill="#ff6b6b" font-family="monospace" font-size="9" opacity="0.5">edge</text>
</svg>
